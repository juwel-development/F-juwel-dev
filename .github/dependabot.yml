version: 2
updates:
  # Root package.json and all npm workspaces
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    groups:
      npm-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
      npm-minor:
        patterns:
          - "*"
        update-types:
          - "minor"


  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    groups:
      actions-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
      actions-minor:
        patterns:
          - "*"
        update-types:
          - "minor"


